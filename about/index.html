	<script>
	const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)')
	var config = {
		startOnLoad:true,
		flowchart:{
		useMaxWidth:true,
		htmlLabels:true,
		curve:'cardinal',
		},
		securityLevel:'loose',
	};
	
	var a=0;
	function darkModeHandler() {
		if (mediaQuery.matches) {
			mermaid.initialize({
				
				theme: 'dark',
				config
			});
			if (a>0){
				document.location.reload(false);
			}
			a+=1;
			
		} else {
			mermaid.initialize({
				
				theme: 'base',
				config
			});
			if (a>0){
				document.location.reload(false);
			}
			a+=1;
			
		}
	}
	darkModeHandler()
	mediaQuery.addListener(darkModeHandler)

	</script>
